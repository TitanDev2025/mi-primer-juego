        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 6px solid #ff0000; background: #050505; touch-action: none; }
        .ui { width: 450px; display: flex; flex-direction: column; padding: 5px; font-weight: bold; }
        .bar { width: 100%; height: 12px; border: 1px solid #fff; background: #222; margin-top: 5px; }
        #pBar { background: #0ff; width: 100%; height: 100%; }
        #yBar { background: #ff0055; width: 100%; height: 100%; }
        .controls { display: grid; grid-template-columns: repeat(3, 80px); gap: 5px; margin-top: 5px; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #0ff; background: #111; color: #0ff; cursor: pointer; }
        #startBtn { position: absolute; top: 300px; padding: 20px 40px; font-size: 20px; background: #ff0055; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
  
    <div class="ui">
        <div>TIME: <span id="time">120</span>s | LIVES: <span id="lives">3</span></div>
        <div>PLAYER: <div class="bar"><div id="pBar"></div></div></div>
        <div>YETI HP: <div class="bar"><div id="yBar"></div></div></div>
    </div>
    <canvas id="canvas" width="450" height="450"></canvas>
<div class="controls">
    <div class="btn" id="l">←</div>
    <div class="btn" id="u">↑</div>
    <div class="btn" id="r">→</div>
    <div class="btn" id="avion" style="border-color:red; color:red">X</div>
    <div class="btn" id="d">↓</div>
      <div class="btn" id="laser" style="border-color:red; color:red">⚠</div>
</div>

    <button id="startBtn">EMPEZAR JUEGO</button>
    
     <div style="height: 50px; width: 100%; background: transparent; clear: both;"></div>
    <div style="height: 50px; width: 100%; background: transparent; clear: both;"></div>
    <div style="height: 50px; width: 100%; background: transparent; clear: both;"></div>
    
    <div style="text-align: center; margin: 10px;">
    <button onclick="setDificultad('facil')">FÁCIL</button>
    <button onclick="setDificultad('normal')">NORMAL</button>
    <button onclick="setDificultad('dificil')">DIFÍCIL</button>
    <button onclick="setDificultad('extremo')">EXTREMO</button>
</div>


<script>
  
  function setDificultad(nivel) {
    if(nivel === 'facil') { yeti.spd = 1.2; p.spd = 2.5; }
    else if(nivel === 'normal') { yeti.spd = 2.5; p.spd = 4; }
    else if(nivel === 'dificil') { yeti.spd = 4; p.spd = 6 ; }
    else if(nivel === 'extremo') { yeti.spd = 4.5; p.spd = 6; }
    alert("Dificultad: " + nivel.toUpperCase());
}

  
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
let pHealth=100, yHealth=700, lives=3, timeLeft=120, gameRunning=false, gameOver=false, keys={}, laserActive=false;

const p = {x: 200, y: 200, w: 12, h: 12, spd: 3};
const yeti = {x: 50, y: 50, w: 25, h: 25, spd: 2, hp: 700}; 

const walls = [
    {x:0,y:0,w:450,h:10},{x:0,y:440,w:450,h:10},{x:0,y:0,w:10,h:450},{x:440,y:0,w:10,h:450},
    {x:80,y:80,w:40,h:40},{x:180,y:80,w:40,h:40},{x:300,y:120,w:40,h:40},
    {x:80,y:250,w:40,h:40},{x:250,y:300,w:40,h:40},{x:150,y:350,w:40,h:40},
    {x:350,y:50,w:40,h:40},{x:50,y:180,w:40,h:40}
    
]

function isCol(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

function moveObj(obj, dx, dy) {
    obj.x += dx;
    for(let w of walls) { if(isCol(obj, w)) { obj.x -= dx; break; } }
    obj.y += dy;
    for(let w of walls) { if(isCol(obj, w)) { obj.y -= dy; break; } }
}

function update() {
    if(!gameRunning || gameOver) return;

    if(keys.u) moveObj(p, 0, -p.spd); if(keys.d) moveObj(p, 0, p.spd);
    if(keys.l) moveObj(p, -p.spd, 0); if(keys.r) moveObj(p, p.spd, 0);

    // Yeti te persigue (Cálculo directo)
    let dx = p.x - yeti.x, dy = p.y - yeti.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > 5) {
        moveObj(yeti, (dx/dist)*yeti.spd, (dy/dist)*yeti.spd);
    }
    
    if(isCol(p, yeti)) { pHealth -= 1; document.getElementById('pBar').style.width = pHealth + "%"; }

    // Laser
    if(laserActive && dist < 300) {
        yHealth -= 2; document.getElementById('yBar').style.width = (yHealth/7) + "%";
        ctx.strokeStyle = 'red'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(p.x+6, p.y+6); ctx.lineTo(yeti.x+12, yeti.y+12); ctx.stroke();
    }

    if(pHealth <= 0) {
        lives--; pHealth = 100; document.getElementById('lives').innerText = lives;
        if(lives <= 0) { gameOver=true; alert("GAME OVER"); location.reload(); }
    }
    if(yHealth <= 0) { gameOver=true; alert("VICTORIA!"); location.reload(); }
    if(timeLeft <= 0) { gameOver=true; alert("TIEMPO AGOTADO"); location.reload(); }

    ctx.clearRect(0,0,450,450);
    ctx.fillStyle= '#FF0000'; walls.forEach(w => ctx.fillRect(w.x,w.y,w.w,w.h));
    ctx.fillStyle='#ffffff'; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle='#FFD700'; ctx.fillRect(yeti.x,yeti.y,yeti.w,yeti.h);
    requestAnimationFrame(update);
}

document.getElementById('startBtn').onclick = () => {
    document.getElementById('startBtn').style.display = 'none';
    gameRunning = true;
    setInterval(() => { if(timeLeft>0) { timeLeft--; document.getElementById('time').innerText = timeLeft; } }, 1000);
    update();
};

['u','d','l','r'].forEach(k => {
    document.getElementById(k).onpointerdown = () => keys[k] = true;
    document.getElementById(k).onpointerup = () => keys[k] = false;
});
document.getElementById('laser').onpointerdown = () => laserActive = true;
document.getElementById('laser').onpointerup = () => laserActive = false;
</script>
</body>
</html>
